<!DOCTYPE html><html lang="es" class="h-100" data-bs-theme="dark"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>OpenFoodFacts by accreativos</title>
    <script src="./js/papaparse.min.js" type="text/javascript"></script>

  <style>

        font-size: 3.5rem;
      }
    }

    .b-example-divider {
      height: 3rem;
      background-color: rgba(0, 0, 0, .1);
      border: solid rgba(0, 0, 0, .15);

      box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
    }

    .b-example-vr {
      flex-shrink: 0;
      width: 1.5rem;
      height: 100vh;
    }

    .bi {
      vertical-align: -.125em;
      fill: currentColor;
    }

    .nav-scroller {
      position: relative;
      z-index: 2;
      height: 2.75rem;
      overflow-y: hidden;
    }

    .nav-scroller .nav {
      display: flex;
      flex-wrap: nowrap;
      padding-bottom: 1rem;
      margin-top: -1px;
      overflow-x: auto;
      text-align: center;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;

</head>

<body class="d-flex h-100 text-center">

  <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-auto">
      <div>
        <h3 class="float-md-start mb-0">NutriAgenda</h3>
        <app-menu current-page=""></app-menu>
      </div>
    </header>

    <main class="px-3 flex-grow-1" id="app-view"></main>
    <footer class="mt-auto text-white-50">
    </footer>
  </div>
  
  <script type="module" src="./js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script type="module" src="./js/main.js"></script>



  <template id="view-index">
    <div class="view-content d-flex flex-column h-100">
      
      <h1>¿Como funciona? <button type="button" class="btn btn-success" id="ya-se">Ya se como va</button></h1>
      
      <p class="lead">Esta aplicacion se ha inspirada en la charla <a href="https://www.youtube.com/watch?v=j5dUzDTQ3mc">Taller de Nutrición: Etiquetado Nutricional</a>
        de la fundacion <a href="https://www.fundacionuapo.org/">UAPO</a></p> 

      <p>El codigo y mas informacion tecnica la puedes encontrar <a href="https://github.com/josejuanmontiel/OpenFoodFacts">aqui.</a></p>
      <p>Basicamente, descargara la base de datos de codigos de barras y te avisara de los valores que no quieras que tus alimentos tengan.</p>

      <div class="container text-center">
        <div class="row">
          <textarea class="form-control" placeholder="Leave a comment here" id="filters" style="height: 100px">Ingrediente 1 |
Ingrediente 2 |
Ingrediente 3</textarea>
        </div>
        <div class="row">
          &nbsp;
        </div>
        <div class="row">
          <!-- Input group -->
          <div class="d-flex justify-content-center">
            <div class="input-group w-auto">
                <input type="text" class="form-control" id="database" aria-describedby="button-addon1" size="50" value="spain_products.tsv.zz">
                <button data-mdb-button-init="" data-mdb-ripple-init="" class="btn btn-primary" type="button" id="download-btn" data-mdb-ripple-color="dark">
                    Empezar
                </button>
            </div>
          </div>
        </div>
      </div>
    
      
    </div>
  </template>
  
  <template id="view-grid">
    <div class="view-content d-flex flex-column h-100">
      
      <div class="container py-4 px-3 mx-auto">
        
        <!-- Botones de sincronización y configuración -->
        <div class="d-flex flex-wrap justify-content-end gap-2 mb-3">
          <button class="btn btn-outline-danger btn-sm" id="clear-db-btn">Borrar BD Local</button>
          <button class="btn btn-outline-secondary btn-sm" id="btn-open-credentials" title="Configurar cuenta OpenFoodFacts">
            ⚙️ Cuenta OFF
          </button>
          <button class="btn btn-outline-warning btn-sm position-relative" id="btn-sync-off">
            ☁️ Sincronizar OFF
            <span id="sync-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"></span>
          </button>
        </div>

    <!-- Cabecera Presupuesto -->
    <div class="card bg-dark text-white mb-4 border-info">
      <div class="card-body d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Total Carro</h4>
        <h2 class="mb-0 text-info" id="cart-total">0.00 €</h2>
      </div>
    </div>

    <!-- Escáner / Búsqueda -->
    <div class="input-group mb-4 justify-content-center">
      <input type="text" id="code-input" class="form-control" style="max-width: 300px;" placeholder="Código o Nombre">
      <button class="btn btn-primary" id="query-btn">Buscar</button>
      <button class="btn btn-outline-light" id="scan-btn"><i class="bi bi-upc-scan"></i> Escanear</button>
    </div>
    
    <!-- Producto desconocido: captura de foto -->
    <div id="unknown-product-panel" class="card bg-dark border-warning text-white mb-4 d-none text-start">
      <div class="card-header bg-warning text-dark fw-bold">
        ⚠️ Producto no encontrado en la BD local
      </div>
      <div class="card-body">
        <p>Código escaneado: <code id="unknown-barcode-label"></code></p>
        <p class="small text-warning-emphasis">No encontramos este producto en nuestra base de datos. Puedes hacer una foto de la etiqueta y la subiremos a OpenFoodFacts para que otros usuarios también se beneficien.</p>

        <div class="row g-2 mb-3">
          <div class="col-12 col-md-6">
            <label class="form-label form-label-sm">Nombre del producto (opcional)</label>
            <input type="text" id="unknown-product-name" class="form-control form-control-sm" placeholder="Ej: Yogur Griego Hacendado">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label form-label-sm">Tipo de foto</label>
            <select id="unknown-image-type" class="form-select form-select-sm">
              <option value="front">Etiqueta frontal (front)</option>
              <option value="ingredients">Ingredientes</option>
              <option value="nutrition">Información nutricional</option>
            </select>
          </div>
        </div>

        <!-- Visor de cámara -->
        <div id="camera-container" class="mb-2 d-none">
          <video id="capture-video" autoplay="" playsinline="" class="w-100 rounded" style="max-height: 260px; object-fit: cover;"></video>
        </div>

        <!-- Preview de foto capturada -->
        <div id="photo-preview-container" class="mb-2 d-none text-center">
          <img id="photo-preview" class="img-fluid rounded" style="max-height: 200px;" alt="Preview">
        </div>

        <div class="d-flex flex-wrap gap-2 mt-3">
          <button id="btn-capture-photo" class="btn btn-outline-info btn-sm">📷 Abrir cámara</button>
          <button id="btn-retake-photo" class="btn btn-outline-secondary btn-sm d-none">🔄 Repetir foto</button>
          <button id="btn-save-photo" class="btn btn-warning btn-sm d-none">💾 Guardar en cola</button>
          <button id="btn-cancel-capture" class="btn btn-outline-danger btn-sm ms-auto">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Alertas y Sugerencias del Asistente (Oculto por defecto) -->
    <div id="assistant-alert" class="alert alert-danger d-none text-start">
      <h5 class="alert-heading"><i class="bi bi-exclamation-triangle"></i> ¡Atención!</h5>
      <p id="assistant-warning-text"></p>
      <hr>
      <p class="mb-0"><strong>Alternativas saludables:</strong></p>
      <div id="assistant-alternatives" class="list-group mt-2"></div>
    </div>

    <!-- Formulario para añadir al carrito (aparece al buscar un producto) -->
    <div id="add-to-cart-panel" class="card bg-secondary text-white mb-4 d-none text-start">
      <div class="card-body">
        <h5 id="scanned-product-name" class="card-title"></h5>
        <div class="row align-items-end mt-3">
          <div class="col-4">
            <label>Cantidad</label>
            <input type="number" id="scanned-amount" class="form-control" value="1">
          </div>
          <div class="col-4">
            <label>Precio (€)</label>
            <input type="number" id="scanned-price" class="form-control" step="0.01">
          </div>
          <div class="col-4">
            <button class="btn btn-success w-100" id="btn-add-cart">Al Carro</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Lista del carrito -->
    <h4 class="text-start mb-3">Mi Compra</h4>
    <div id="cart-list" class="list-group text-start mb-4">
      <!-- Inyectado vía JS -->
    </div>

    <button class="btn btn-warning btn-lg w-100 mb-3" id="btn-checkout">Pasar por Caja (Llenar Despensa)</button>

    <script type="module" src="./js/grid.js"></script>
  </div>
      
      <div class="modal fade" id="modal-credentials" tabindex="-1" aria-labelledby="modal-credentials-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="modal-credentials-label">⚙️ Cuenta OpenFoodFacts</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-start">

          <!-- Estado actual -->
          <div id="cred-status" class="alert alert-secondary py-2 mb-3 small">
            Cargando estado...
          </div>

          <!-- No tienes cuenta? -->
          <div class="card bg-dark border-info mb-3">
            <div class="card-body py-2">
              <p class="mb-1 small"><strong>No tienes cuenta en OpenFoodFacts?</strong></p>
              <p class="mb-2 small text-muted">El registro es gratuito y abierto. Tu cuenta permite contribuir fotos de productos que aun no estan en la base de datos mundial.</p>
              <a href="https://world.openfoodfacts.org/cgi/user.pl" target="_blank" rel="noopener" class="btn btn-info btn-sm w-100">
                🌍 Crear cuenta gratis en OpenFoodFacts.org
              </a>
            </div>
          </div>

          <!-- Formulario -->
          <div class="mb-3">
            <label for="cred-username" class="form-label form-label-sm">Usuario de OpenFoodFacts</label>
            <input type="text" id="cred-username" class="form-control form-control-sm bg-secondary text-white border-secondary" placeholder="tu_usuario" autocomplete="username">
          </div>
          <div class="mb-3">
            <label for="cred-password" class="form-label form-label-sm">Contrasena</label>
            <div class="input-group input-group-sm">
              <input type="password" id="cred-password" class="form-control bg-secondary text-white border-secondary" placeholder="••••••••" autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="btn-toggle-password" title="Mostrar/ocultar">
                👁
              </button>
            </div>
            <div class="form-text text-muted">Las credenciales se guardan solo en este navegador (localStorage). Nunca se envian a nuestros servidores.</div>
          </div>

          <!-- Resultado de la verificacion -->
          <div id="cred-verify-result" class="d-none small mt-2"></div>
        </div>
        <div class="modal-footer border-secondary flex-wrap gap-2">
          <button class="btn btn-outline-info btn-sm" id="btn-verify-credentials">🔍 Verificar credenciales</button>
          <button class="btn btn-outline-danger btn-sm" id="btn-clear-credentials">🗑 Borrar credenciales</button>
          <button class="btn btn-success btn-sm ms-auto" id="btn-save-credentials">💾 Guardar</button>
        </div>
      </div>
    </div>
  </div>
<div class="modal fade" id="modal-missing-weights" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title">⚖️ Faltan Pesos</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-start">
          <p class="small text-muted mb-3">Los siguientes productos no tienen peso registrado en la base de datos. Por favor, indícalo (en gramos) para que el inventario funcione correctamente.</p>
          <form id="missing-weights-form">
            <!-- Injected by JS -->
          </form>
        </div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success btn-sm" id="btn-save-missing-weights">Guardar y Continuar</button>
        </div>
      </div>
    </div>
  </div>

    </div>
  </template>
  
  <template id="view-pantry">
    <div class="view-content d-flex flex-column h-100">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Mi Despensa</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStockModal">
          + Añadir Stock
        </button>
      </div>

      <!-- Buscador -->
      <div class="input-group mb-4">
        <input type="text" id="pantry-search" class="form-control" placeholder="Buscar en mi despensa...">
        <button class="btn btn-outline-light" id="scan-pantry-btn"><i class="bi bi-upc-scan"></i> Escanear</button>
      </div>

      <!-- Lista de inventario -->
      <div class="row" id="pantry-list">
        <!-- Inyectado vía JS -->
      </div>
    
      <div class="modal fade" id="addStockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Añadir Stock</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="add-stock-form">
            <div class="mb-3">
              <label class="form-label">Producto</label>
              <div class="input-group mb-2">
                <input type="text" id="stock-product-search" class="form-control" placeholder="Buscar por nombre o código...">
                <button class="btn btn-outline-secondary" type="button" id="btn-scan-stock" title="Escanear código"><i class="bi bi-upc-scan"></i></button>
                <button class="btn btn-outline-secondary" type="button" id="btn-search-stock-product">Buscar</button>
              </div>
              <div id="stock-product-results" class="list-group mb-2" style="max-height: 150px; overflow-y: auto;"></div>
              <input type="hidden" id="stock-product-selected">
            </div>

            <div class="row mb-3">
              <div class="col-8">
                <label class="form-label">Cantidad</label>
                <input type="number" class="form-control" id="stock-amount" value="500" min="1">
              </div>
              <div class="col-4">
                <label class="form-label">Unidad</label>
                <select class="form-select" id="stock-unit">
                  <option value="g">g</option>
                  <option value="ml">ml</option>
                  <option value="unidad">ud</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-save-stock">Añadir</button>
        </div>
      </div>
    </div>
  </div>
<div class="modal fade" id="consumeStockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Retirar de Despensa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="consume-stock-form">
            <input type="hidden" id="consume-product-code">
            <div class="mb-3">
              <p><strong>Producto:</strong> <span id="consume-product-name"></span></p>
              <p><strong>Stock actual:</strong> <span id="consume-product-stock"></span></p>
            </div>
            <div class="mb-3">
              <label class="form-label">Motivo</label>
              <select class="form-select" id="consume-reason">
                <option value="consumed_family">Se lo ha comido alguien de la familia</option>
                <option value="trashed">Se ha tirado a la basura</option>
                <option value="expired">Ha caducado</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Cantidad a retirar</label>
              <input type="number" class="form-control" id="consume-amount" value="100" min="1">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btn-confirm-consume">Retirar</button>
        </div>
      </div>
    </div>
  </div>
<div class="modal fade" id="productDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detail-product-name">Detalle del Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p><strong>Código:</strong> <span id="detail-product-code"></span></p>
          <p><strong>Stock en despensa:</strong> <span id="detail-product-stock"></span></p>
          <div id="detail-nutriscore-nova" class="mb-3"></div>
          
          <h6>Información Nutricional (por 100g/ml)</h6>
          <ul class="list-group list-group-flush mb-3" id="detail-nutrition-list">
            <!-- Rellenado por JS -->
          </ul>
          
          <h6>Historial de Movimientos</h6>
          <div class="list-group" id="detail-movements-list" style="max-height: 200px; overflow-y: auto;">
            <!-- Rellenado por JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

    </div>
  </template>
  
  <template id="view-recipes">
    <div class="view-content d-flex flex-column h-100">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Mis Recetas</h1>
        <button class="btn btn-primary" id="btn-new-recipe">
          <i class="bi bi-plus-lg"></i> Nueva Receta
        </button>
      </div>

      <!-- Buscador -->
      <div class="input-group mb-4">
        <input type="text" id="recipe-search" class="form-control" placeholder="Buscar receta...">
      </div>

      <!-- Lista de recetas -->
      <div class="row" id="recipes-list">
        <!-- Las recetas se inyectan aquí vía JS -->
      </div>
    
      <div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="recipeModalTitle">Nueva Receta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="recipe-form">
            <input type="hidden" id="recipe-id">
            
            <div class="row mb-3">
              <div class="col-md-8">
                <label for="recipe-name" class="form-label">Nombre de la receta</label>
                <input type="text" class="form-control" id="recipe-name" required="">
              </div>
              <div class="col-md-4">
                <label for="recipe-servings" class="form-label">Raciones</label>
                <input type="number" class="form-control" id="recipe-servings" value="1" min="1" step="0.5" required="">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Ingredientes</label>
              
              <!-- Buscador de productos para añadir ingrediente -->
              <div class="input-group mb-2">
                <input type="text" id="ingredient-search" class="form-control" placeholder="Código de barras o nombre...">
                <button class="btn btn-outline-secondary" type="button" id="btn-search-product">Buscar</button>
                <button class="btn btn-outline-secondary" type="button" id="btn-scan-product">Scan</button>
              </div>
              <div id="product-search-results" class="list-group mb-2" style="display:none; max-height: 150px; overflow-y: auto;"></div>

              <!-- Lista de ingredientes añadidos -->
              <ul class="list-group ingredient-list" id="ingredient-list">
                <!-- Se inyectan vía JS -->
              </ul>
            </div>

            <div class="mb-3">
              <label class="form-label">Nutrición (por ración)</label>
              <div id="nutrition-preview" class="p-2 border rounded">
                Añade ingredientes para calcular la nutrición.
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-save-recipe">Guardar Receta</button>
        </div>
      </div>
    </div>
  </div>

    </div>
  </template>
  
  <template id="view-recipe-editor">
    <div class="view-content d-flex flex-column h-100">
      
    <div class="editor-header">
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="window.history.back()">←</button>
        <h1 class="h5 mb-0" id="editor-page-title">Nueva Receta</h1>
        <span class="version-badge" id="version-badge" style="display:none;"></span>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-info" id="btn-duplicate-recipe" style="display:none;" title="Duplicar receta">📋</button>
        <button class="btn btn-sm btn-outline-danger" id="btn-delete-recipe" style="display:none;" title="Eliminar receta">🗑</button>
        <button class="btn btn-sm btn-success px-3" id="btn-save-recipe">💾 Guardar</button>
      </div>
    </div>
    <div class="editor-grid">

      <!-- Columna principal -->
      <div>
        <div class="section-card">
          <div class="section-title">📋 Información básica</div>
          <input type="hidden" id="recipe-id">
          <div class="row g-3">
            <div class="col-8">
              <label class="form-label small">Nombre</label>
              <input type="text" class="form-control" id="recipe-name" placeholder="Nombre de la receta" required="">
            </div>

                <div class="progress-bar bg-warning" id="macro-carb-bar" style="width: 0%"></div>
              </div>
            </div>

            <div class="mb-3">
              <div class="d-flex justify-content-between small">
                <span>Grasas</span><span id="macro-fat-text">--/-- g</span>
              </div>
              <div class="progress macro-progress bg-dark">
                <div class="progress-bar bg-danger" id="macro-fat-bar" style="width: 0%"></div>
              </div>
            </div>
            
            <div class="mb-3">
              <div class="d-flex justify-content-between small">
                <span>Fibra</span><span id="macro-fiber-text">--/-- g</span>
              </div>
              <div class="progress macro-progress bg-dark">
                <div class="progress-bar bg-success" id="macro-fiber-bar" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Variedad Semanal -->
        <div class="col-md-4">
          <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="text-muted mb-0">Variedad Semanal</h5>
              <span class="badge bg-primary" id="variety-score">--%</span>
            </div>
            <div class="variety-list" id="variety-list">
              <!-- Se inyecta por JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Histórico de la semana -->
      <div class="row">
        <div class="col-12">
          <div class="dashboard-card">
            <h5 class="text-muted mb-3">Histórico de Calorías (Semana)</h5>
            <div class="chart-container">
              <canvas id="weekChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    
      
    </div>
  </template>
  
  <template id="view-db-viewer">
    <div class="view-content d-flex flex-column h-100">
      
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 text-start">Visor de Productos</h4>
        <div class="btn-group" role="group">
          <input type="radio" class="btn-check" name="dbtype" id="db-official" value="official" checked="">
          <label class="btn btn-outline-primary btn-sm" for="db-official">BD Oficial</label>

          <input type="radio" class="btn-check" name="dbtype" id="db-custom" value="custom">
          <label class="btn btn-outline-primary btn-sm" for="db-custom">Mis Productos</label>
        </div>
        <span id="db-count" class="badge bg-primary ms-2">Cargando...</span>
      </div>
      
      <div class="input-group mb-3">
        <input type="text" id="db-search" class="form-control bg-dark text-white border-secondary" placeholder="Buscar por nombre o código...">
      </div>

      <!-- El contenedor donde Tabulator dibujará la tabla -->
      <div id="db-table" class="flex-grow-1 text-start" style="min-height: 400px; height: 60vh;"></div>
    
      
    </div>
  </template>
  
  <template id="view-settings">
    <div class="view-content d-flex flex-column h-100">
      
      <h1 class="mb-4">⚙️ Ajustes y Copias de Seguridad</h1>

      <div class="settings-section">
        <h4 class="mb-3">Exportar Datos</h4>
        <p class="text-muted small mb-3">
          Descarga una copia de seguridad de toda tu base de datos (recetas, agenda, inventario, fotos). 
          <strong>Nota:</strong> La base de datos maestra de productos (OpenFoodFacts) no se exporta porque se puede volver a descargar y ocuparía demasiado espacio.
        </p>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" id="btn-export">💾 Descargar Backup (.json)</button>
          <button class="btn btn-info" id="btn-share-sys" style="display:none;">📤 Sincronizar (vía Pingo u otras apps)</button>
        </div>
      </div>

      <div class="settings-section">
        <h4 class="mb-3">Importar Datos</h4>
        <p class="text-muted small mb-3 text-warning">
          <strong>⚠️ Cuidado:</strong> Al restaurar un backup, se sobrescribirán por completo tus recetas, agenda e inventario actuales. Esta acción no se puede deshacer.
        </p>
        <div class="input-group mb-3">
          <input type="file" class="form-control" id="import-file" accept=".json,.txt">
          <button class="btn btn-outline-warning" type="button" id="btn-import">Restaurar</button>
        </div>
      </div>
      <div class="settings-section border-danger border border-2">
        <h4 class="mb-3 text-danger">Zona Peligrosa</h4>
        <p class="text-muted small mb-3">
          Borra todas tus recetas, diario, inventario y configuración. 
          <strong>Nota:</strong> Esto NO borrará la base de datos de ingredientes importada.
        </p>
        <button class="btn btn-outline-danger" id="btn-clear-data">🗑️ Borrar Todos los Datos Personales</button>
      </div>
    
      
    </div>
  </template>
  </body></html>
