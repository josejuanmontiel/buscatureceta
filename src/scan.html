<!doctype html>
<html lang="es" class="h-100" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" type="text/css" href="/css/style.css">
  <!-- CSS Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>Escanear Producto</title>
  <style>
    body {
      background-color: #212529;
      color: #fff;
    }
    #reader-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 8px;
    }
    #qr-reader {
      width: 100%;
      min-height: 300px;
      background: #000;
    }
  </style>
</head>

<body class="d-flex flex-column h-100 text-center">
  <div class="container d-flex flex-column justify-content-center flex-grow-1 p-3">
    <div class="mb-4">
      <h2 class="h4">Escáner de Códigos</h2>
      <p class="text-muted small">Apunta con la cámara al código de barras del producto o selecciona una imagen de tu galería.</p>
    </div>

    <div id="reader-container" class="mb-4 border border-secondary shadow-sm">
      <div id="qr-reader"></div>
    </div>

    <div id="error-msg" class="text-danger small mb-3"></div>

    <div class="d-grid gap-3 mx-auto" style="max-width: 300px;">
      <button class="btn btn-primary btn-lg" id="btn-camera">
        <i class="bi bi-camera"></i> Usar Cámara
      </button>
      <button class="btn btn-outline-light btn-lg" id="btn-gallery">
        <i class="bi bi-image"></i> Leer de Galería
      </button>
      <input type="file" id="file-input" accept="image/*" style="display: none;">
      
      <button class="btn btn-link text-muted mt-2" onclick="goBack()">Cancelar</button>
    </div>
  </div>

  <script>
    var html5QrCode;
    
    function docReady(fn) {
      if (document.readyState === "complete" || document.readyState === "interactive") {
        setTimeout(fn, 1);
      } else {
        document.addEventListener("DOMContentLoaded", fn);
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().catch(console.error);
      }
      
      console.log(`Scan result ${decodedText}`, decodedResult.result.text);
      const code = decodedResult.result.text;
      const urlParams = new URLSearchParams(window.location.search);
      const returnPage = urlParams.get('return') || '#grid';
      urlParams.delete('return');
      urlParams.set('code', code);
      const separator = returnPage.includes('?') ? '&' : '?';
      window.location.href = `/${returnPage}${separator}${urlParams.toString()}`;
    }
    
    function onScanFailure(error) {
      // ignore failures as they happen constantly during scanning
    }

    function goBack() {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => window.history.back()).catch(() => window.history.back());
      } else {
        window.history.back();
      }
    }

    docReady(function () {
      html5QrCode = new Html5Qrcode("qr-reader");
      
      const btnCamera = document.getElementById('btn-camera');
      const btnGallery = document.getElementById('btn-gallery');
      const fileInput = document.getElementById('file-input');
      const errorMsg = document.getElementById('error-msg');

      btnCamera.addEventListener('click', () => {
        errorMsg.innerText = '';
        if (html5QrCode.isScanning) return;
        
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 150 } },
          onScanSuccess,
          onScanFailure
        ).catch((err) => {
          errorMsg.innerText = "Error iniciando la cámara: " + err;
        });
      });

      btnGallery.addEventListener('click', () => {
        if (html5QrCode.isScanning) {
          html5QrCode.stop().then(() => fileInput.click()).catch(console.error);
        } else {
          fileInput.click();
        }
      });

      fileInput.addEventListener('change', e => {
        errorMsg.innerText = '';
        if (e.target.files.length == 0) {
          return;
        }
        
        const imageFile = e.target.files[0];
        html5QrCode.scanFile(imageFile, true)
          .then(decodedText => {
            onScanSuccess(decodedText, { result: { text: decodedText } });
          })
          .catch(err => {
            errorMsg.innerText = "No se ha encontrado un código de barras en esta imagen.";
            console.error(`Error scanning file. Reason: ${err}`);
          });
      });
      
      // Auto-iniciar cámara si es posible
      setTimeout(() => btnCamera.click(), 500);
    });
  </script>
</body>
</html>
