<!doctype html>
<html lang="es" class="h-100" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visor BD - NutriAgenda</title>
  
  <link rel="stylesheet" type="text/css" href="/css/style.css">
  
  <!-- Tabulator CSS for the table -->
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column h-100 text-center text-bg-dark">
  <div class="container-fluid d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-4">
      <div>
        <h3 class="float-md-start mb-0">NutriAgenda</h3>
        <app-menu current-page="db-viewer.html"></app-menu>
      </div>
    </header>

    <main class="px-3 flex-grow-1 d-flex flex-column">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 text-start">Base de Datos Local</h4>
        <span id="db-count" class="badge bg-primary">Cargando...</span>
      </div>
      
      <div class="input-group mb-3">
        <input type="text" id="db-search" class="form-control bg-dark text-white border-secondary" placeholder="Buscar por nombre o código...">
      </div>

      <!-- El contenedor donde Tabulator dibujará la tabla -->
      <div id="db-table" class="flex-grow-1 text-start" style="min-height: 400px; height: 60vh;"></div>
    </main>
  </div>

  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <script type="module" src="./js/db-viewer.js"></script>
</body>
</html>
