<!doctype html>
<html lang="es" class="h-100" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda - NutriAgenda</title>
  
  <link rel="stylesheet" type="text/css" href="/css/style.css">
  <style>
    .diary-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    @media (max-width: 768px) {
      .diary-grid {
        grid-template-columns: 1fr;
      }
    }
    .diary-day {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      min-height: 200px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .diary-day-header {
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      color: #6ea8fe;
    }
    .meal-slot {
      background: #444;
      padding: 5px;
      border-radius: 4px;
      margin-bottom: 5px;
      font-size: 0.85em;
      cursor: pointer;
    }
    .meal-slot:hover {
      background: #555;
    }
    .meal-type-label {
      font-size: 0.75em;
      color: #aaa;
      text-transform: uppercase;
    }
  </style>
</head>

<body class="d-flex flex-column h-100">

  <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-4">
      <div>
        <h3 class="float-md-start mb-0">NutriAgenda</h3>
        <app-menu current-page="diary.html"></app-menu>
      </div>
    </header>

  <!-- Templates extraídos para SPA -->
  <template id="tpl-diary-day">
    <div class="col-md-3 mb-3 d-flex align-items-stretch">
      <div class="card w-100 diary-day">
        <div class="card-header py-2 d-flex justify-content-between align-items-center">
          <span class="day-name fw-bold"></span>
          <span class="day-date small text-muted"></span>
        </div>
        <div class="card-body p-2 d-flex flex-column gap-2 day-meals"></div>
        <div class="card-footer p-2 bg-transparent border-top-0 pt-0 d-flex gap-1 action-buttons">
          <!-- buttons inserted dynamically -->
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-meal-slot">
    <div class="meal-slot d-flex justify-content-between align-items-start">
      <span class="me-1" style="min-width: 0; flex: 1; white-space: pre-line; word-break: break-word;"></span>
      <span class="text-warning small mt-1" style="white-space: nowrap;"></span>
    </div>
  </template>

    <main class="px-3 flex-grow-1">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Agenda de Comidas</h1>
        <div>
          <button class="btn btn-outline-light me-2" id="btn-prev-week">&lt; Semana Anterior</button>
          <span id="current-week-label" class="fw-bold me-2"></span>
          <button class="btn btn-outline-light" id="btn-next-week">Semana Siguiente &gt;</button>
        </div>
      </div>

      <!-- Grid semanal -->
      <div class="diary-grid" id="diary-grid">
        <!-- Los días se inyectan vía JS -->
      </div>
    </main>

  </div>

  <!-- Modal para Registrar Comida -->
  <div class="modal fade" id="mealModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="mealModalTitle">Registrar Comida</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="meal-form">
            <input type="hidden" id="meal-date">
            
            <div class="mb-3">
              <label for="meal-type" class="form-label">Tipo de comida</label>
              <select class="form-select" id="meal-type">
                <option value="breakfast">Desayuno</option>
                <option value="lunch" selected>Comida</option>
                <option value="snack">Merienda</option>
                <option value="dinner">Cena</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">¿Qué has comido?</label>
              
              <!-- Tabs para Receta o Producto -->
              <ul class="nav nav-tabs mb-2" id="mealTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-recipe" data-bs-toggle="tab" data-bs-target="#pane-recipe" type="button">Receta guardada</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-product" data-bs-toggle="tab" data-bs-target="#pane-product" type="button">Producto escaneado</button>
                </li>
              </ul>

              <div class="tab-content" id="mealTabContent">
                <!-- Panel Receta -->
                <div class="tab-pane fade show active" id="pane-recipe">
                  <select class="form-select mb-2" id="meal-recipe-select">
                    <option value="">-- Selecciona receta --</option>
                  </select>
                  <label class="form-label mt-2">Cantidad consumida</label>
                  <div class="input-group mb-2">
                    <input type="number" class="form-control" id="meal-recipe-amount" value="1" min="0.1" step="0.1">
                    <select class="form-select" id="meal-recipe-unit" style="max-width: 120px;">
                      <option value="servings">Raciones</option>
                      <option value="grams">Gramos</option>
                    </select>
                  </div>
                  
                  <div id="meal-recipe-ingredients-container" style="display: none;" class="mt-3 p-2 bg-dark rounded border border-secondary">
                    <label class="form-label small text-info mb-1">Ajuste manual de ingredientes</label>
                    <div id="meal-recipe-ingredients" style="max-height: 150px; overflow-y: auto;">
                      <!-- Injected via JS -->
                    </div>
                  </div>
                </div>
                
                <!-- Panel Producto -->
                <div class="tab-pane fade" id="pane-product">
                  <div class="input-group mb-2">
                    <input type="text" id="meal-product-search" class="form-control" placeholder="Buscar por nombre o escanear...">
                    <button class="btn btn-outline-secondary" type="button" id="btn-scan-meal" title="Escanear código">📷</button>
                    <button class="btn btn-outline-secondary" type="button" id="btn-search-meal-product">
                      <span id="meal-search-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span> Buscar
                    </button>
                  </div>
                  
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="checkbox" id="meal-search-pantry-only">
                      <label class="form-check-label small" for="meal-search-pantry-only">Solo en mi despensa</label>
                    </div>
                    <button class="btn btn-sm btn-outline-warning" type="button" onclick="window.addGenericProduct(document.getElementById('meal-product-search').value || 'Genérico')">+ Genérico rápido</button>
                  </div>

                  <div id="meal-product-results" class="list-group mb-2" style="max-height: 100px; overflow-y: auto;"></div>
                  <input type="hidden" id="meal-product-selected">
                  
                  <label class="form-label mt-2">Gramos consumidos</label>
                  <input type="number" class="form-control" id="meal-product-grams" value="100" min="1">
                </div>
              </div>
            </div>

            <details class="mb-3">
              <summary class="form-label text-info" style="cursor:pointer;">Opciones opcionales (Hambre, notas...)</summary>
              <div class="mt-2 border border-secondary p-2 rounded bg-dark">
                <label class="form-label small">Hambre antes de comer</label>
                <input type="range" class="form-range" id="meal-hunger" min="1" max="10" value="5">
                <div class="d-flex justify-content-between"><small>Poca</small><small>Mucha</small></div>
              </div>
            </details>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="meal-deduct-pantry" checked>
              <label class="form-check-label" for="meal-deduct-pantry">
                Descontar automáticamente de mi Despensa
              </label>
            </div>
            
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-save-meal">Guardar Ingesta</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal captura de foto rápida desde la agenda -->
  <div class="modal fade" id="diaryPhotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">📷 Foto de lo que comí</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="diary-photo-date">
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label small">Tipo de comida</label>
              <select class="form-select form-select-sm" id="diary-photo-meal-type">
                <option value="">-- Sin especificar --</option>
                <option value="breakfast">Desayuno</option>
                <option value="lunch">Comida</option>
                <option value="snack">Merienda</option>
                <option value="dinner">Cena</option>
              </select>
            </div>
          </div>

          <div id="diary-camera-section">
            <video id="diary-video" autoplay playsinline class="w-100 rounded mb-2" style="max-height:220px;"></video>
            <div class="d-flex gap-2">
              <button class="btn btn-primary flex-grow-1" id="btn-diary-snap">📸 Capturar</button>
              <button class="btn btn-outline-info" id="btn-diary-gallery" title="Elegir foto de galería">🖼️ Galería</button>
              <button class="btn btn-outline-secondary" id="btn-diary-stop-camera" title="Cancelar">✕</button>
            </div>
            <input type="file" id="diary-file-input" accept="image/*" style="display:none;">
          </div>

          <div id="diary-photo-preview-section" style="display:none;">
            <img id="diary-photo-preview" class="w-100 rounded mb-2" style="max-height:220px;object-fit:cover;" alt="Vista previa">
            <button class="btn btn-outline-secondary btn-sm w-100" id="btn-diary-retake">🔄 Repetir foto o cambiar</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-diary-save-photo" disabled>💾 Guardar foto</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Detalle de Ítem -->
  <div class="modal fade" id="itemDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-truncate" id="itemDetailTitle">Detalle</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="d-flex justify-content-between mb-2">
            <strong>Calorías:</strong> <span><span id="itemDetailKcal">0</span> kcal</span>
          </div>
          <div class="d-flex justify-content-between mb-1 small text-muted">
            <span>Proteínas:</span> <span><span id="itemDetailProt">0</span> g</span>
          </div>
          <div class="d-flex justify-content-between mb-1 small text-muted">
            <span>Carbohidratos:</span> <span><span id="itemDetailCarbs">0</span> g</span>
          </div>
          <div class="d-flex justify-content-between mb-3 small text-muted">
            <span>Grasas:</span> <span><span id="itemDetailFat">0</span> g</span>
          </div>
          
          <div id="itemDetailPhotoContainer" class="text-center mb-1" style="display:none;">
             <a id="itemDetailPhotoLink" href="#" class="btn btn-outline-info btn-sm">🖼️ Ver foto original</a>
          </div>
        </div>
        <div class="modal-footer justify-content-between">
          <button type="button" class="btn btn-outline-danger btn-sm" id="btn-delete-item">🗑️ Borrar</button>
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/diary.js"></script>
</body>
</html>
